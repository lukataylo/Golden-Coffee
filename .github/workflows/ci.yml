name: CI

# Fast, deterministic checks that run with NO GPU, NO camera, NO API keys —
# the same regime the live demo falls back to. Guards the two shared contracts
# (SceneEvent / AgentAction) and every offline capability.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lean test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Unit tests (auth, command bar, comfort, forecast/discounts, FLock packaging, ops-report)
        run: python -m pytest backend federated shared agent codeplain -q

      - name: Deep capabilities eval (policy, music model, agent, schemas, actuators, geometry, federated)
        run: python -m eval.capabilities_eval

      - name: Policy self-test (offline, no key)
        run: python -m agent.policy

      - name: FLock federated port runs end-to-end
        run: python -m federated.flock_model

      - name: Federated simulation runs end-to-end
        run: python -m federated.sim

      - name: Import smoke — every core module loads
        run: |
          python - <<'PY'
          import importlib
          mods = [
              "shared.schemas", "shared.comfort", "shared.mock_events",
              "agent.policy", "agent.forecast", "agent.discounts",
              "agent.music_model", "agent.agent",
              "backend.main", "federated.node", "federated.sim",
              "onchain.walrus",
          ]
          for m in mods:
              importlib.import_module(m)
              print("ok", m)
          PY

  e2e:
    # Real-browser smoke: renders the demo dashboard and asserts it loads with no
    # JS errors and the hero chips (conversion + £-at-risk) + 3D canvas populate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.56.1
          npx playwright install --with-deps chromium
      - name: Serve the dashboard
        run: |
          (cd dashboard && python3 -m http.server 8099 &)
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:8099/index.html >/dev/null && break; sleep 0.5; done
      - name: Headless dashboard smoke (demo mode)
        run: node scripts/smoke_dashboard.cjs
      - name: Upload demo screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-demo-screenshot
          path: /tmp/dashboard_demo.png
          if-no-files-found: ignore
