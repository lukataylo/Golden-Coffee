name: Deploy live demo to GitHub Pages

# Publishes the static dashboard as a public, self-contained live demo. The
# dashboard runs fully client-side in demo mode (open the URL with ?demo=1),
# so no backend is needed — judges get a shareable URL of the whole experience
# (£-at-risk chip, conversion, 3D floor twin, action feed) with zero setup.
#
# ONE-TIME SETUP (no token, ~10 seconds): repo Settings → Pages → Build and
# deployment → Source = "GitHub Actions". The Actions token can't enable Pages
# itself ("Resource not accessible by integration"), so this single toggle is the
# only manual step. After that, every push to main — or a manual run from the
# Actions tab — publishes the live demo to:
#   https://lukataylo.github.io/Golden-Coffee/?demo=1   (auto-starts the demo)

on:
  workflow_dispatch:        # run manually from the Actions tab once Pages is on
  push:
    branches: ["main"]
    paths: ["dashboard/**", ".github/workflows/pages.yml"]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages (self-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload dashboard as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
