<script src="./gc.js"></script>
<script>
(function(){
  'use strict';
  var token = GC.token();
  if(!token){ window.location.replace('./signin.html'); return; }

  var loading = document.getElementById('loading');
  var content = document.getElementById('content');
  var errBox = document.getElementById('errBox');

  document.getElementById('signout').addEventListener('click', function(){
    GC.api('/auth/logout', { method:'POST', auth:true }).catch(function(){}).then(function(){
      GC.clearSession();
      window.location.assign('./signin.html');
    });
  });

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }

  var PROFILE_LABELS = [
    ['business_type','Type'],
    ['ambiance','Ambiance'],
    ['busiest_period','Busiest period'],
    ['primary_goal','Main goal'],
    ['room_size','Seats / covers'],
    ['postcode','Postcode'],
    ['camera_position','Camera'],
    ['start_mode','Starts in'],
    ['billing','Billing']
  ];
  var PLAN_LABEL = { pulse:'Pulse', autopilot:'Autopilot', multi:'Multi-venue' };

  function render(user){
    var prof = user.profile || {};
    document.getElementById('firstName').textContent = (user.name || '').split(' ')[0] || 'there';
    document.getElementById('venueLine').textContent = user.venue
      ? (user.venue + ' · ' + (user.email || '')) : (user.email || 'Your room is ready.');
    document.getElementById('planBadge').textContent =
      (PLAN_LABEL[user.plan] || 'Your plan') + ' · free 14-day pilot';

    var rows = PROFILE_LABELS.filter(function(p){ return prof[p[0]]; }).map(function(p){
      var v = prof[p[0]];
      if(p[0]==='room_size') v = v + ' covers';
      if(p[0]==='camera_position' && prof.camera_type) v = v + ' · ' + prof.camera_type;
      return '<div class="prof-row"><span class="k">'+esc(p[1])+'</span><span class="v">'+esc(v)+'</span></div>';
    });
    var devs = Array.isArray(prof.devices) ? prof.devices : (prof.devices ? [prof.devices] : []);
    if(devs.length){
      rows.push('<div class="prof-row"><span class="k">Connected devices</span><span class="v">'+esc(devs.join(', '))+'</span></div>');
    }
    document.getElementById('profileBox').innerHTML = rows.join('') ||
      '<div class="skel">No profile details captured yet.</div>';

    loading.style.display = 'none';
    content.style.display = 'block';
  }

  function fail(msg, expired){
    loading.style.display = 'none';
    if(expired){ GC.clearSession(); }
    document.getElementById('errAlert').textContent = msg;
    errBox.style.display = 'block';
  }

  GC.api('/auth/me', { auth:true })
    .then(function(res){ render(res.user || {}); })
    .catch(function(err){
      if(err && err.status === 401){
        fail('Your session has expired. Please sign in again.', true);
      } else {
        fail((err && err.detail) || 'Could not load your account right now. Please try again shortly.', false);
      }
    });
})();
</script>

</html>
