<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Golden Coffee — Ops Copilot</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 -apple-system, system-ui, sans-serif;
           background: #14110e; color: #f3ede3; }
    header { padding: 16px 24px; background: #1d1813; border-bottom: 1px solid #332a20;
             display: flex; align-items: baseline; gap: 12px; }
    h1 { font-size: 18px; margin: 0; color: #d9a441; }
    .sub { color: #8c7d68; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px 24px; }
    .card { background: #1d1813; border: 1px solid #332a20; border-radius: 10px; padding: 14px; }
    .card h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
               color: #8c7d68; margin: 0 0 8px; }
    .big { font-size: 32px; font-weight: 600; color: #f3ede3; }
    .wide { grid-column: span 2; }
    .full { grid-column: span 4; }
    .feed { max-height: 260px; overflow:auto; display:flex; flex-direction:column; gap:6px; }
    .action { border-left: 3px solid #d9a441; padding: 6px 10px; background:#241d16; border-radius:4px; }
    .action .name { color:#d9a441; font-weight:600; }
    .action .why { color:#b6a88f; }
    .manual { background:#3a2a14; }
    .funnel-row { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #2a2219; }
    .heat { display:grid; grid-template-columns: repeat(8, 1fr); gap:2px; }
    .heat div { aspect-ratio:1; border-radius:2px; background:#d9a441; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; }
    .ok { background:#1f3a1f; color:#7ed87e; } .off { background:#3a1f1f; color:#d87e7e; }
  </style>
</head>
<body>
  <header>
    <h1>☕ Golden Coffee</h1>
    <span class="sub">Hospitality Ops Copilot · privacy-by-design</span>
    <span id="conn" class="pill off" style="margin-left:auto">connecting…</span>
  </header>

  <div class="grid">
    <div class="card"><h2>Occupancy</h2><div id="occ" class="big">–</div></div>
    <div class="card"><h2>Queue</h2><div id="queue" class="big">–</div></div>
    <div class="card"><h2>Staff productivity</h2><div id="prod" class="big">–</div></div>
    <div class="card"><h2>Cups made</h2><div id="cups" class="big">–</div></div>

    <div class="card wide"><h2>Conversion funnel</h2><div id="funnel"></div></div>
    <div class="card wide"><h2>Flow / dwell heatmap</h2><div id="heat" class="heat"></div></div>

    <div class="card full"><h2>Agent actions <span class="sub">(perceive → reason → act)</span></h2>
      <div id="feed" class="feed"></div></div>
  </div>

  <script>
    // Point this at your Render/Railway backend in production (wss://...).
    const WS = (location.search.match(/ws=([^&]+)/)?.[1]) || "ws://127.0.0.1:8000/ws";
    const $ = (id) => document.getElementById(id);

    function renderScene(s) {
      $("occ").textContent = s.occupancy;
      $("queue").textContent = s.queue_len;
      $("prod").textContent = Math.round((s.staff_productivity || 0) * 100) + "%";
      $("cups").textContent = s.cups_made;
      const f = s.funnel || {};
      $("funnel").innerHTML = ["entered","approached","ordered","seated","abandoned"]
        .map(k => `<div class="funnel-row"><span>${k}</span><b>${f[k] ?? 0}</b></div>`).join("");
      if (s.heatmap_grid) {
        $("heat").innerHTML = s.heatmap_grid.flat()
          .map(v => `<div style="opacity:${Math.min(1, 0.08 + v)}"></div>`).join("");
      }
    }
    function renderAction(a) {
      const el = document.createElement("div");
      el.className = "action" + (a.auto ? "" : " manual");
      el.innerHTML = `<span class="name">${a.action}</span> `
        + `<code>${JSON.stringify(a.params)}</code>`
        + `<div class="why">${a.rationale || ""}${a.auto ? "" : " · manual override"}</div>`;
      $("feed").prepend(el);
    }

    function connect() {
      const sock = new WebSocket(WS);
      sock.onopen = () => { $("conn").textContent = "live"; $("conn").className = "pill ok"; };
      sock.onclose = () => { $("conn").textContent = "reconnecting…"; $("conn").className = "pill off"; setTimeout(connect, 1500); };
      sock.onmessage = (e) => {
        const m = JSON.parse(e.data);
        if (m.type === "scene") renderScene(m);
        else if (m.type === "action") renderAction(m);
      };
    }
    connect();
  </script>
</body>
</html>
